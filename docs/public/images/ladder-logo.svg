<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <defs>
    <linearGradient id="ladder-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="200" height="80" rx="12" fill="url(#ladder-grad)"/>
  <!-- 梯子简化图案 -->
  <line x1="40" y1="25" x2="40" y2="60" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="70" y1="25" x2="70" y2="60" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="40" y1="32" x2="70" y2="32" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="42" x2="70" y2="42" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="52" x2="70" y2="52" stroke="white" stroke-width="2" opacity="0.4"/>
  <text x="100" y="40" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="900" fill="white" text-anchor="middle">天梯赛</text>
  <text x="100" y="60" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.8)" text-anchor="middle">团体程序设计天梯赛</text>
</svg>
